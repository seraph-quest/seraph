id: seraph.hermes-browserbase
version: 2026.3.23
display_name: Hermes Browserbase
kind: connector-pack
compatibility:
  seraph: ">=2026.4.10"
publisher:
  name: Seraph
trust: bundled
summary: Managed Browserbase-style browser provider package with local-fallback browsing until remote transport lands.
contributes:
  browser_providers:
    - connectors/browser/browserbase.yaml
  toolset_presets:
    - presets/toolset/browserbase-ops.yaml
permissions:
  tools:
    - browse_webpage
    - browser_session
  execution_boundaries:
    - external_read
    - secret_management
  network: true
  data_access:
    - browser_session_state
    - external_web_pages
    - provider_credentials
  mutation_rights:
    - browser_navigation
    - remote_browser_session_config
  audit_events:
    - connector_configured
    - connector_enabled
    - browser_session_started
  secrets:
    - browserbase_api_key
