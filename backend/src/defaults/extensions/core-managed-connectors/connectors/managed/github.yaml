name: github-managed
provider: github
description: Curated GitHub connector for repository, issue, and pull-request workflows.
auth_kind: oauth
capabilities:
  - pull_requests.read
  - pull_requests.write
  - issues.read
  - issues.write
  - repositories.read
setup_steps:
  - Authorize GitHub access for Seraph.
  - Select the installation or organization scope to use.
config_fields:
  - key: installation_id
    label: Installation ID
    required: true
  - key: api_base_url
    label: API Base URL
    required: false
    input: url
runtime_adapter:
  kind: mcp_server
  server_names:
    - github
    - raw-github-mcp
  routes:
    repository.read:
      tool_names:
        - search_repositories
      result_kind: repository
    work_items.read:
      tool_names:
        - search_issues
      result_kind: work_item
    code_activity.read:
      tool_names:
        - search_pull_requests
      result_kind: code_activity
