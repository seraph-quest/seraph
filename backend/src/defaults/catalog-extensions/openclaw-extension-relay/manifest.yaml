id: seraph.openclaw-extension-relay
version: 2026.3.24
display_name: OpenClaw Extension Relay
kind: connector-pack
compatibility:
  seraph: ">=2026.4.10"
publisher:
  name: Seraph
trust: bundled
summary: Browser-extension relay provider package with staged local-fallback execution until relay transport lands.
contributes:
  browser_providers:
    - connectors/browser/extension-relay.yaml
  toolset_presets:
    - presets/toolset/extension-relay-ops.yaml
permissions:
  tools:
    - browse_webpage
    - browser_session
  execution_boundaries:
    - external_read
    - secret_management
  network: true
  data_access:
    - browser_session_state
    - external_web_pages
    - relay_credentials
  mutation_rights:
    - browser_navigation
    - extension_relay_session_config
  audit_events:
    - connector_configured
    - connector_enabled
    - browser_session_started
  secrets:
    - extension_relay_token
