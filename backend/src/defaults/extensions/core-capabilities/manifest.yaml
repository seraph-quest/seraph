id: seraph.core-capabilities
version: 2026.4.6
display_name: Core Capabilities
kind: capability-pack
compatibility:
  seraph: ">=2026.4.10"
publisher:
  name: Seraph
trust: bundled
summary: Bundled default skills, workflows, starter packs, and runbooks.
permissions:
  tools:
    - browse_webpage
    - browser_session
    - collect_source_evidence
    - create_goal
    - execute_code
    - execute_source_mutation
    - get_goal_progress
    - get_goals
    - http_request
    - plan_source_report
    - plan_source_review
    - plan_source_mutation
    - read_file
    - source_capabilities
    - view_soul
    - web_search
    - write_file
  network: true
contributes:
  skills:
    - skills/code-review.md
    - skills/daily-standup.md
    - skills/evening-journal.md
    - skills/goal-reflection.md
    - skills/moltbook.md
    - skills/morning-intention.md
    - skills/source-daily-review.md
    - skills/source-evidence-review.md
    - skills/source-goal-alignment.md
    - skills/source-progress-review.md
    - skills/source-progress-report.md
    - skills/web-briefing.md
    - skills/weekly-planner.md
  workflows:
    - workflows/goal-snapshot-to-file.md
    - workflows/web-brief-to-file.md
  runbooks:
    - runbooks/daily-operator-rhythm.yaml
    - runbooks/research-briefing.yaml
    - runbooks/source-daily-review.yaml
    - runbooks/source-evidence-review.yaml
    - runbooks/source-goal-alignment.yaml
    - runbooks/source-progress-review.yaml
    - runbooks/source-progress-report.yaml
    - runbooks/weekly-alignment.yaml
  starter_packs:
    - starter-packs/daily-operator-rhythm.json
    - starter-packs/research-briefing.json
    - starter-packs/source-daily-review.json
    - starter-packs/source-evidence-review.json
    - starter-packs/source-goal-alignment.json
    - starter-packs/source-progress-review.json
    - starter-packs/source-progress-report.json
    - starter-packs/weekly-alignment.json
