id: seraph.openclaw-poll-watch
version: 2026.3.24
display_name: OpenClaw Poll Watch
kind: connector-pack
compatibility:
  seraph: ">=2026.3.19"
publisher:
  name: Seraph
trust: bundled
summary: Poll-trigger package for staged OpenClaw-style recurring fetch workflows.
