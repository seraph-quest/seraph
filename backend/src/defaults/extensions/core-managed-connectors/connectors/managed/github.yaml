name: github-managed
provider: github
description: Curated GitHub connector for repository, issue, and pull-request workflows.
auth_kind: oauth
capabilities:
  - pull_requests.read
  - pull_requests.write
  - issues.read
  - issues.write
  - repositories.read
setup_steps:
  - Authorize GitHub access for Seraph.
  - Select the installation or organization scope to use.
config_fields:
  - key: installation_id
    label: Installation ID
    required: true
  - key: api_base_url
    label: API Base URL
    required: false
    input: url
runtime_adapter:
  kind: mcp_server
  server_names:
    - github
    - raw-github-mcp
  routes:
    repository.read:
      tool_names:
        - search_repositories
      result_kind: repository
    work_items.read:
      tool_names:
        - search_issues
      result_kind: work_item
    work_items.write:
      result_kind: work_item
      actions:
        create:
          tool_names:
            - create_issue
          target_reference_mode: repository
          target_argument_name: repo_full_name
          required_payload_fields:
            - title
            - body
          allowed_payload_fields:
            - title
            - body
          payload_argument_map:
            title: title
            body: body
        comment:
          tool_names:
            - add_comment_to_issue
          target_reference_mode: work_item
          target_argument_name: repo_full_name
          number_argument_name: issue_number
          required_payload_fields:
            - body
          allowed_payload_fields:
            - body
          payload_argument_map:
            body: comment
    code_activity.read:
      tool_names:
        - search_pull_requests
      result_kind: code_activity
